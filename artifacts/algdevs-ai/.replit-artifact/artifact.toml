kind = "web"
previewPath = "/"
title = "AlgDevs-AI"
version = "1.0.0"
id = "artifacts/algdevs-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23443

[services.development]
run = "pnpm --filter @workspace/algdevs-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/algdevs-ai", "run", "build" ]
publicDir = "artifacts/algdevs-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23443"
BASE_PATH = "/"
