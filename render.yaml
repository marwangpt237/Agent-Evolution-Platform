services:
  - type: web
    name: agent-evolution-platform
    env: docker
    plan: free
    region: ohio
    dockerfilePath: Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromGroup: my-database-env-group
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
    healthCheckPath: /api/healthz
